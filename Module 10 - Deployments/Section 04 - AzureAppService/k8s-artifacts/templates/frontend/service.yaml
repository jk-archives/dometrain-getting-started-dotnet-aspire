---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "frontend-service"
  labels:
    app.kubernetes.io/name: "my-aspire-app"
    app.kubernetes.io/component: "frontend"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "my-aspire-app"
    app.kubernetes.io/component: "frontend"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: {{ .Values.parameters.frontend.port_http | int }}
      targetPort: {{ .Values.parameters.frontend.port_http | int }}
