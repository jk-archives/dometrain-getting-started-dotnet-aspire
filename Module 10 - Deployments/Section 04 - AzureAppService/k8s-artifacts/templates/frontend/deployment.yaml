---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "frontend-deployment"
  labels:
    app.kubernetes.io/name: "my-aspire-app"
    app.kubernetes.io/component: "frontend"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "my-aspire-app"
        app.kubernetes.io/component: "frontend"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      containers:
        - image: "{{ .Values.parameters.frontend.frontend_image }}"
          name: "frontend"
          envFrom:
            - configMapRef:
                name: "frontend-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: {{ .Values.parameters.frontend.port_http | int }}
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "my-aspire-app"
      app.kubernetes.io/component: "frontend"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
